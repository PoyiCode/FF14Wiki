name: CI

on:
  push:
    branches: [main]
  pull_request:

# 同一分支的新 push 會取消尚在跑的舊 workflow，省資源。
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate content
        run: npm run validate

      - name: Lint
        run: npm run lint

      - name: Build static site
        run: npm run build
